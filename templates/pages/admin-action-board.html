<div class="dept-dashboard-layout">
  <!-- Main: Action Board -->
  <div class="dept-dashboard-main">
    <div class="dept-sheet-card">
      <div class="dept-sheet-header">
        <div class="dept-sheet-title-wrap">
          <h3 class="dept-sheet-title">Action Board</h3>
          <span class="dept-sheet-count" id="main-count">0</span>
        </div>
        <input type="text" class="dept-sheet-search" id="main-search" placeholder="Search deliverables...">
      </div>
      <div class="dept-sheet-container" id="main-sheet" style="overflow:auto;flex:1"></div>
    </div>
  </div>

  <!-- Side: Materials Requested -->
  <div class="dept-dashboard-side">
    <div class="dept-sheet-card dept-sheet-card-compact">
      <div class="dept-sheet-header">
        <div class="dept-sheet-title-wrap">
          <h3 class="dept-sheet-title">Materials Requested</h3>
          <span class="dept-sheet-count" id="side-count">0</span>
        </div>
      </div>
      <div class="dept-sheet-container" id="side-sheet" style="overflow:auto;flex:1"></div>
    </div>
  </div>
</div>
