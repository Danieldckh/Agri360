<div class="decline-modal-overlay">
  <div class="decline-modal">
    <h3>Reason for Decline</h3>
    <textarea class="decline-modal-textarea" placeholder="Enter the reason for declining this proposal..." rows="4"></textarea>
    <div class="decline-modal-buttons">
      <button class="decline-modal-btn decline-modal-cancel">Cancel</button>
      <button class="decline-modal-btn decline-modal-confirm">Decline</button>
    </div>
  </div>
</div>
