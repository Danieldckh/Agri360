<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — ProAgri</title>
<style>
  /* ── Neutral design tokens ──
     A calm, professional palette anchored on dark navy/charcoal instead of
     the older bright-red theme. Pastel icon backgrounds give to-do rows a
     friendly distinguishing color without screaming for attention. */
  :root {
    --cp-bg: #f5f6f8;
    --cp-surface: #ffffff;
    --cp-surface-alt: #f7f8fa;
    --cp-surface-soft: #eff1f5;
    --cp-border: #e8eaee;
    --cp-border-strong: #d6d9e0;
    --cp-text: #1a1d29;
    --cp-text-secondary: #4b5063;
    --cp-text-muted: #8b8f9c;
    --cp-accent: #1a1d29;
    --cp-accent-hover: #2c3041;
    --cp-accent-fg: #ffffff;        /* foreground color for accent surfaces */
    --cp-accent-soft: rgba(26, 29, 41, 0.06);
    --cp-ring: rgba(26, 29, 41, 0.18);

    --cp-success: #1f8a4c;
    --cp-success-soft: rgba(31, 138, 76, 0.12);
    --cp-warn: #c8632e;
    --cp-warn-soft: rgba(200, 99, 46, 0.12);
    --cp-danger: #dc2626;
    --cp-danger-soft: rgba(220, 38, 38, 0.12);

    /* Pastel icon backgrounds (peach / blue / mint) — used by to-do rows */
    --cp-icon-peach: #fde6dc;
    --cp-icon-peach-fg: #c8632e;
    --cp-icon-blue: #dde9ff;
    --cp-icon-blue-fg: #2563eb;
    --cp-icon-mint: #d6f0e1;
    --cp-icon-mint-fg: #1f8a4c;

    --cp-shadow-card: 0 1px 2px rgba(15, 17, 28, 0.04), 0 6px 20px rgba(15, 17, 28, 0.05);
    --cp-shadow-float: 0 4px 24px rgba(15, 17, 28, 0.12);
    --cp-radius: 16px;
    --cp-radius-sm: 12px;

    --cp-sidebar-w: 64px;
    --cp-sidebar-bg: #ffffff;
    --cp-sidebar-fg: #7a8193;
    --cp-sidebar-fg-active: #1a1d29;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--cp-bg);
    color: var(--cp-text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── App shell: sidebar + main column ── */
  .cp-app {
    display: flex;
    min-height: 100vh;
  }

  /* ── Sidebar ── */
  .cp-sidebar {
    width: var(--cp-sidebar-w);
    background: var(--cp-sidebar-bg);
    border-right: 1px solid var(--cp-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 0;
    gap: 12px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .cp-profile {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--cp-icon-peach-fg);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 15px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .cp-nav-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--cp-sidebar-fg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }

  .cp-nav-btn:hover {
    background: rgba(26, 29, 41, 0.08);
    color: var(--cp-sidebar-fg-active);
  }

  .cp-nav-btn.active {
    background: rgba(26, 29, 41, 0.14);
    color: var(--cp-sidebar-fg-active);
  }

  .cp-nav-btn svg {
    width: 20px;
    height: 20px;
  }

  .cp-nav-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    background: var(--cp-icon-peach-fg);
    color: #fff;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 800;
    min-width: 14px;
    height: 14px;
    padding: 0 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cp-nav-spacer {
    flex: 1;
  }

  /* ── Main column ── */
  .cp-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  /* Top bar with page title + search + bell */
  .cp-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 36px;
    background: var(--cp-bg);
    border-bottom: 1px solid transparent;
  }

  .cp-page-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--cp-text);
    margin: 0;
    letter-spacing: -0.01em;
  }

  .cp-topbar-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .cp-search {
    position: relative;
    width: 280px;
  }

  .cp-search input {
    width: 100%;
    padding: 9px 14px 9px 38px;
    border: 1px solid var(--cp-border);
    border-radius: 999px;
    background: var(--cp-surface);
    color: var(--cp-text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .cp-search input:focus {
    border-color: var(--cp-border-strong);
    box-shadow: 0 0 0 3px var(--cp-ring);
  }

  .cp-search svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--cp-text-muted);
    pointer-events: none;
  }

  .cp-bell {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--cp-icon-peach-fg);
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .cp-bell svg { width: 18px; height: 18px; }

  .cp-bell-badge {
    position: absolute;
    top: -3px;
    right: -3px;
    background: var(--cp-text);
    color: var(--cp-bg);
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--cp-bg);
  }

  /* ── Greeting + content area ── */
  .cp-content {
    padding: 8px 36px 60px;
  }

  .cp-greeting {
    margin: 0 0 24px;
  }

  .cp-greeting h2 {
    font-size: 28px;
    font-weight: 800;
    color: var(--cp-text);
    margin: 0 0 6px;
    letter-spacing: -0.02em;
  }

  .cp-greeting p {
    font-size: 14px;
    color: var(--cp-text-muted);
    margin: 0;
  }

  /* ── Generic card ── */
  .cp-card {
    background: var(--cp-surface);
    border: 1px solid var(--cp-border);
    border-radius: var(--cp-radius);
    padding: 22px 24px;
    box-shadow: var(--cp-shadow-card);
  }

  .cp-card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--cp-text);
    margin: 0 0 16px;
  }

  .cp-empty {
    padding: 48px;
    text-align: center;
    color: var(--cp-text-muted);
    font-size: 14px;
  }

  /* ── Dashboard grid: 1.1fr / 1fr column split, single column < 960 ── */
  .cp-grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 22px;
  }

  .cp-col {
    display: flex;
    flex-direction: column;
    gap: 22px;
    min-width: 0;
  }

  /* ── To Do list ── */
  .cp-todo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--cp-surface-alt);
    border-radius: var(--cp-radius-sm);
    margin-bottom: 10px;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .cp-todo-row:last-child { margin-bottom: 0; }

  .cp-todo-row.clickable { cursor: pointer; }

  .cp-todo-row.clickable:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(15, 17, 28, 0.06);
  }

  .cp-todo-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .cp-todo-icon.peach { background: var(--cp-icon-peach); color: var(--cp-icon-peach-fg); }
  .cp-todo-icon.blue  { background: var(--cp-icon-blue);  color: var(--cp-icon-blue-fg); }
  .cp-todo-icon.mint  { background: var(--cp-icon-mint);  color: var(--cp-icon-mint-fg); }

  .cp-todo-text { flex: 1; min-width: 0; }
  .cp-todo-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--cp-text);
    margin-bottom: 2px;
  }

  .cp-todo-sub {
    font-size: 12px;
    color: var(--cp-text-muted);
  }

  .cp-todo-count {
    font-size: 22px;
    font-weight: 800;
    color: var(--cp-text);
    flex-shrink: 0;
  }

  /* ── Embedded chat (used inside Messages card) ── */
  .cp-messages-card { display: flex; flex-direction: column; }

  .cp-chat {
    display: flex;
    flex-direction: column;
    height: 380px;
    border-radius: var(--cp-radius-sm);
    overflow: hidden;
    background: var(--cp-surface-alt);
  }

  .cp-chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .cp-chat-empty {
    margin: auto;
    text-align: center;
    color: var(--cp-text-muted);
    font-size: 13px;
  }

  .cp-msg {
    display: flex;
    gap: 10px;
    max-width: 82%;
  }

  .cp-msg-employee { align-self: flex-start; }
  .cp-msg-client { align-self: flex-end; flex-direction: row-reverse; }

  .cp-msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    background: var(--cp-icon-peach-fg);
    overflow: hidden;
  }

  .cp-msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .cp-msg-client .cp-msg-avatar { background: var(--cp-text-muted); }

  .cp-msg-bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.45;
    word-wrap: break-word;
  }

  .cp-msg-employee .cp-msg-bubble {
    background: var(--cp-surface);
    color: var(--cp-text);
    border: 1px solid var(--cp-border);
    border-top-left-radius: 4px;
  }

  .cp-msg-client .cp-msg-bubble {
    background: var(--cp-accent);
    color: var(--cp-accent-fg);
    border-top-right-radius: 4px;
  }

  .cp-msg-meta {
    font-size: 10px;
    color: var(--cp-text-muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .cp-chat-input-row {
    display: flex;
    gap: 10px;
    padding: 14px 0 0;
  }

  .cp-chat-input {
    flex: 1;
    padding: 12px 18px;
    background: var(--cp-surface-alt);
    color: var(--cp-text);
    border: 1px solid var(--cp-border);
    border-radius: 999px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .cp-chat-input:focus {
    border-color: var(--cp-border-strong);
    box-shadow: 0 0 0 3px var(--cp-ring);
  }

  .cp-chat-send {
    padding: 0 26px;
    background: var(--cp-accent);
    color: var(--cp-accent-fg);
    border: none;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }

  .cp-chat-send:hover { background: var(--cp-accent-hover); }
  .cp-chat-send:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── Materials forms (restyled to match new aesthetic) ── */
  .cp-form-card {
    background: var(--cp-surface);
    border: 1px solid var(--cp-border);
    border-radius: var(--cp-radius);
    padding: 26px;
    margin-bottom: 18px;
    box-shadow: var(--cp-shadow-card);
  }

  .cp-form-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--cp-text);
    margin: 0 0 18px;
  }

  .cp-form-field {
    background: var(--cp-surface-alt);
    border: 1px solid var(--cp-border);
    border-radius: var(--cp-radius-sm);
    padding: 18px;
    margin-bottom: 14px;
  }

  .cp-form-field .fq {
    font-size: 14px;
    font-weight: 700;
    color: var(--cp-text);
    margin-bottom: 12px;
  }

  .cp-form-field input[type=text],
  .cp-form-field input[type=number],
  .cp-form-field input[type=date],
  .cp-form-field textarea {
    width: 100%;
    padding: 11px 14px;
    background: var(--cp-surface);
    color: var(--cp-text);
    border: 1px solid var(--cp-border);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .cp-form-field input:focus,
  .cp-form-field textarea:focus {
    border-color: var(--cp-border-strong);
    box-shadow: 0 0 0 3px var(--cp-ring);
  }

  .cp-form-field textarea { min-height: 90px; resize: vertical; }
  .cp-form-field input[type=file] {
    display: block;
    margin-top: 4px;
    font-size: 12px;
    color: var(--cp-text-muted);
  }

  .cp-form-submit {
    padding: 12px 26px;
    background: var(--cp-accent);
    color: var(--cp-accent-fg);
    border: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }

  .cp-form-submit:hover { background: var(--cp-accent-hover); }

  .cp-form-completed {
    padding: 14px;
    background: var(--cp-success-soft);
    color: var(--cp-success);
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
  }

  /* ── Approval cards ── */
  .cp-approval-card {
    background: var(--cp-surface);
    border: 1px solid var(--cp-border);
    border-radius: var(--cp-radius);
    padding: 26px;
    margin-bottom: 18px;
    box-shadow: var(--cp-shadow-card);
  }

  .cp-approval-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--cp-text);
    margin: 0 0 6px;
  }

  .cp-approval-meta {
    font-size: 12px;
    color: var(--cp-text-muted);
    margin-bottom: 14px;
  }

  .cp-change-counter {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    background: var(--cp-warn-soft);
    color: var(--cp-warn);
  }

  .cp-change-counter.exhausted {
    background: var(--cp-danger-soft);
    color: var(--cp-danger);
  }

  .cp-post-card {
    background: var(--cp-surface-alt);
    border: 1px solid var(--cp-border);
    border-radius: var(--cp-radius-sm);
    padding: 16px;
    margin: 14px 0;
  }

  .cp-post-date {
    font-size: 12px;
    font-weight: 700;
    color: var(--cp-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .cp-post-caption {
    margin: 8px 0;
    font-size: 14px;
    line-height: 1.5;
    color: var(--cp-text);
    min-height: 40px;
    outline: none;
    padding: 6px;
    border-radius: 6px;
  }

  .cp-post-caption:focus {
    background: var(--cp-surface);
    border: 1px solid var(--cp-border-strong);
    box-shadow: 0 0 0 3px var(--cp-ring);
  }

  .cp-post-images { display: flex; gap: 8px; flex-wrap: wrap; }

  .cp-post-images img {
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid var(--cp-border);
  }

  .cp-approval-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .cp-btn {
    padding: 10px 20px;
    border: 1px solid var(--cp-border);
    border-radius: 999px;
    background: var(--cp-surface);
    color: var(--cp-text);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .cp-btn-approve {
    background: var(--cp-success);
    color: #fff;
    border-color: var(--cp-success);
  }

  .cp-btn-approve:hover { filter: brightness(1.08); }

  .cp-btn-changes {
    background: var(--cp-warn);
    color: #fff;
    border-color: var(--cp-warn);
  }

  .cp-btn-changes:hover { filter: brightness(1.08); }

  .cp-btn-changes:disabled {
    background: var(--cp-surface-alt);
    color: var(--cp-text-muted);
    border-color: var(--cp-border);
    cursor: not-allowed;
    filter: none;
  }

  .cp-changes-box {
    margin-top: 14px;
    display: none;
    background: var(--cp-surface-alt);
    border: 1px solid var(--cp-border);
    border-radius: 12px;
    padding: 14px;
  }

  .cp-changes-box.open { display: block; }

  .cp-changes-box textarea {
    width: 100%;
    min-height: 90px;
    padding: 12px;
    background: var(--cp-surface);
    color: var(--cp-text);
    border: 1px solid var(--cp-border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    outline: none;
  }

  .cp-changes-box textarea:focus {
    border-color: var(--cp-border-strong);
    box-shadow: 0 0 0 3px var(--cp-ring);
  }

  /* ── Lightbox ── */
  .cp-lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .cp-lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 10px;
  }

  .cp-lightbox .close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
  }

  /* ── Content Calendar per-post approval UX ── */
  .cp-cc-card {
    background: var(--cp-surface);
    border: 1px solid var(--cp-border);
    border-radius: var(--cp-radius);
    padding: 26px;
    margin-bottom: 18px;
    box-shadow: var(--cp-shadow-card);
  }
  .cp-cc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .cp-cc-header h3 {
    font-size: 17px;
    font-weight: 800;
    color: var(--cp-text);
    margin: 0;
  }
  .cp-cc-revisions {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    background: var(--cp-warn-soft);
    color: var(--cp-warn);
  }
  .cp-cc-revisions.exhausted {
    background: var(--cp-danger-soft);
    color: var(--cp-danger);
  }
  .cp-cc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .cp-cc-post {
    background: var(--cp-surface-alt);
    border: 1px solid var(--cp-border);
    border-radius: var(--cp-radius-sm);
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .cp-cc-post:hover {
    transform: translateY(-2px);
    box-shadow: var(--cp-shadow-card);
  }
  .cp-cc-post-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background: var(--cp-surface-soft);
    display: block;
  }
  .cp-cc-post-caption {
    font-size: 12px;
    color: var(--cp-text-secondary);
    line-height: 1.4;
    padding: 10px 12px 4px;
    min-height: 38px;
  }
  .cp-cc-post-status {
    display: inline-block;
    margin: 6px 12px 12px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    align-self: flex-start;
    background: var(--cp-surface-soft);
    color: var(--cp-text-muted);
  }
  .cp-cc-post[data-status="approved"] .cp-cc-post-status {
    background: var(--cp-success-soft);
    color: var(--cp-success);
  }
  .cp-cc-post[data-status="changes_requested"] .cp-cc-post-status {
    background: var(--cp-warn-soft);
    color: var(--cp-warn);
  }
  .cp-cc-post[data-status="approved"] { border-color: var(--cp-success); }
  .cp-cc-post[data-status="changes_requested"] { border-color: var(--cp-warn); }

  /* Modal */
  .cp-cc-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .cp-cc-modal-panel {
    background: var(--cp-surface);
    border-radius: var(--cp-radius);
    max-width: 860px;
    width: 100%;
    max-height: 90vh;
    overflow: hidden;
    position: relative;
    box-shadow: var(--cp-shadow-float);
    display: flex;
    flex-direction: column;
  }
  .cp-cc-modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    border: none;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    z-index: 2;
  }
  .cp-cc-modal-body {
    display: flex;
    gap: 0;
    overflow: auto;
  }
  .cp-cc-modal-media {
    flex: 1 1 50%;
    background: #0d0f16;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 320px;
  }
  .cp-cc-modal-media img {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    display: block;
  }
  .cp-cc-modal-media .cp-cc-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0, 0, 0, 0.5);
    color: #fff;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
  }
  .cp-cc-modal-media .cp-cc-nav.prev { left: 10px; }
  .cp-cc-modal-media .cp-cc-nav.next { right: 10px; }
  .cp-cc-modal-form {
    flex: 1 1 50%;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
  }
  .cp-cc-modal-form label {
    font-size: 11px;
    font-weight: 700;
    color: var(--cp-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cp-cc-modal-form textarea {
    width: 100%;
    padding: 12px;
    background: var(--cp-surface-alt);
    color: var(--cp-text);
    border: 1px solid var(--cp-border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    outline: none;
  }
  .cp-cc-modal-caption { min-height: 110px; }
  .cp-cc-modal-changes { min-height: 80px; }
  .cp-cc-modal-form textarea:focus {
    border-color: var(--cp-border-strong);
    box-shadow: 0 0 0 3px var(--cp-ring);
  }
  .cp-cc-modal-error {
    font-size: 12px;
    color: var(--cp-danger);
    background: var(--cp-danger-soft);
    padding: 8px 12px;
    border-radius: 8px;
    display: none;
  }
  .cp-cc-modal-error.open { display: block; }
  .cp-cc-modal-actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
    padding-top: 10px;
    flex-wrap: wrap;
  }
  .cp-cc-approve-btn,
  .cp-cc-request-btn {
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1 1 auto;
  }
  .cp-cc-approve-btn {
    background: var(--cp-success);
    color: #fff;
    border: 1px solid var(--cp-success);
  }
  .cp-cc-approve-btn:hover { filter: brightness(1.08); }
  .cp-cc-request-btn {
    background: var(--cp-surface);
    color: var(--cp-text);
    border: 1px solid var(--cp-border-strong);
  }
  .cp-cc-request-btn:hover:not(:disabled) { background: var(--cp-surface-alt); }
  .cp-cc-request-btn:disabled,
  .cp-cc-approve-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    filter: none;
  }
  /* ── Agri4All Posts per-post-type approval UX ── */
  .cp-a4a-wrap { display:flex; flex-direction:column; gap:16px; margin-bottom:18px; }
  .cp-a4a-wrap-title {
    font-size:17px;
    font-weight:800;
    color:var(--cp-text);
    margin:0 0 4px;
  }
  .cp-a4a-card[data-status="approved"] { border-color: var(--cp-success); }
  .cp-a4a-card[data-status="changes_requested"] { border-color: var(--cp-warn); }
  .cp-a4a-pill {
    display:inline-flex;
    align-items:center;
    padding:6px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:800;
    color:#ffffff;
    letter-spacing:0.02em;
  }
  .cp-a4a-pill-fb { background:#1877F2; }
  .cp-a4a-pill-ig { background:linear-gradient(135deg,#833ab4 0%,#fd1d1d 50%,#fcb045 100%); }
  .cp-a4a-pill-ig-story { background:#E1306C; }
  .cp-a4a-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
    gap:10px;
    margin:14px 0;
  }
  .cp-a4a-thumb {
    aspect-ratio:1 / 1;
    overflow:hidden;
    border-radius:var(--cp-radius-sm);
    background:var(--cp-surface-soft);
    border:1px solid var(--cp-border);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cp-a4a-thumb img {
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .cp-a4a-file-link {
    font-size:11px;
    color:var(--cp-text-secondary);
    padding:6px;
    text-align:center;
    text-decoration:none;
    word-break:break-all;
  }
  .cp-a4a-empty {
    grid-column:1 / -1;
    text-align:center;
    color:var(--cp-text-muted);
    font-size:12px;
    padding:20px;
  }
  .cp-a4a-status-row {
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .cp-a4a-status-badge {
    display:inline-block;
    padding:5px 12px;
    border-radius:999px;
    font-size:10px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.04em;
    background:var(--cp-surface-soft);
    color:var(--cp-text-muted);
  }
  .cp-a4a-card[data-status="approved"] .cp-a4a-status-badge {
    background:var(--cp-success-soft);
    color:var(--cp-success);
  }
  .cp-a4a-card[data-status="changes_requested"] .cp-a4a-status-badge {
    background:var(--cp-warn-soft);
    color:var(--cp-warn);
  }
  .cp-a4a-request-panel { max-width:560px; }
  .cp-a4a-request-panel .cp-cc-modal-form { flex:1 1 100%; }

  @media (max-width: 720px) {
    .cp-cc-modal-body { flex-direction: column; }
    .cp-cc-modal-media { min-height: 240px; }
  }

  /* ── Responsive: stack the dashboard grid + collapse search on narrow screens ── */
  @media (max-width: 960px) {
    .cp-grid { grid-template-columns: 1fr; }
    .cp-search { display: none; }
    .cp-content { padding: 8px 20px 60px; }
    .cp-topbar { padding: 18px 20px; }
  }
</style>
</head>
<body>

<div class="cp-app">

  <aside class="cp-sidebar">
    <div class="cp-profile" id="cpProfile">·</div>
    <button class="cp-nav-btn active" data-tab="dashboard" title="Dashboard" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    </button>
    <button class="cp-nav-btn" data-tab="materials" title="Request Materials" aria-label="Request Materials">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
    </button>
    <button class="cp-nav-btn" data-tab="approvals" title="Approvals" aria-label="Approvals">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
    </button>
    <div class="cp-nav-spacer"></div>
  </aside>

  <main class="cp-main">
    <header class="cp-topbar">
      <h1 class="cp-page-title" id="cpPageTitle">Dashboard</h1>
      <div class="cp-topbar-right">
        <div class="cp-search">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="cpSearch" placeholder="Search...">
        </div>
        <button class="cp-bell" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
          <span class="cp-bell-badge" id="cpBellBadge" style="display:none;">0</span>
        </button>
      </div>
    </header>

    <div class="cp-content">
      <div class="cp-greeting" id="cpGreeting">
        <h2 id="cpGreetText">Loading...</h2>
        <p id="cpGreetSub">&nbsp;</p>
      </div>
      <div id="content"></div>
    </div>
  </main>

</div>

<script>
(function () {
  'use strict';
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if (!token) {
    document.getElementById('content').innerHTML = '<div class="cp-empty">Invalid portal link.</div>';
    return;
  }

  var client = null;
  var currentTab = 'dashboard';
  var dashboardSnapshot = null; // last fetched dashboard data, used to drive bell badge

  // Per-tab page title + greeting subtitle
  var TAB_META = {
    dashboard: { title: 'Dashboard', sub: "Here's what needs your attention today" },
    materials: { title: 'Request Materials', sub: 'Forms your ProAgri team needs you to complete' },
    approvals: { title: 'Approvals', sub: 'Content waiting for your review' }
  };

  // Time-of-day greeting
  function timeGreeting() {
    var h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 18) return 'Good afternoon';
    return 'Good evening';
  }

  // Update the topbar title + greeting block based on the active tab
  function updateChrome() {
    var meta = TAB_META[currentTab] || TAB_META.dashboard;
    document.getElementById('cpPageTitle').textContent = meta.title;

    var greetEl = document.getElementById('cpGreetText');
    var subEl = document.getElementById('cpGreetSub');
    if (currentTab === 'dashboard') {
      var name = client && client.name ? client.name.split(' ')[0] : '';
      greetEl.textContent = timeGreeting() + (name ? ', ' + name : '');
    } else {
      greetEl.textContent = meta.title;
    }
    subEl.textContent = meta.sub;
  }

  // Fetch client info
  fetch('/api/portal/' + token + '/client')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.error) {
        document.getElementById('cpPageTitle').textContent = 'Invalid link';
        document.getElementById('content').innerHTML =
          '<div class="cp-empty">This portal link is invalid or expired.</div>';
        return;
      }
      client = data;
      // Profile circle initial
      var initial = (data.name || '?').trim().charAt(0).toUpperCase() || '?';
      document.getElementById('cpProfile').textContent = initial;
      document.title = 'Portal — ' + (data.name || '');
      updateChrome();
      renderTab();
    });

  // Tab switching (sidebar buttons)
  document.querySelectorAll('.cp-nav-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.cp-nav-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      updateChrome();
      renderTab();
    });
  });

  function setActiveTab(tabId) {
    currentTab = tabId;
    document.querySelectorAll('.cp-nav-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.tab === tabId);
    });
    updateChrome();
    renderTab();
  }

  function renderTab() {
    var el = document.getElementById('content');
    el.innerHTML = '';
    // Stop chat polling when leaving dashboard — it'll restart on mountChat()
    if (currentTab !== 'dashboard' && _chatPollTimer) {
      clearInterval(_chatPollTimer);
      _chatPollTimer = null;
    }
    if (currentTab === 'dashboard') renderDashboard(el);
    else if (currentTab === 'materials') renderMaterials(el);
    else if (currentTab === 'approvals') renderApprovals(el);
  }

  // ========== DASHBOARD ==========
  // Renders a 2-column grid: left has the To Do card, right has the Messages card.
  // Both columns share the same dashboard fetch — pendingFormCount and
  // pendingApprovalCount become rows in the To Do list.
  function renderDashboard(el) {
    fetch('/api/portal/' + token + '/dashboard')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        dashboardSnapshot = data;
        updateBellBadge();

        var pendingForms = data.pendingFormCount || 0;
        var pendingApprovals = data.pendingApprovalCount || 0;

        // Layout: cp-grid with left + right columns
        var grid = document.createElement('div');
        grid.className = 'cp-grid';

        // ── LEFT column ──
        var leftCol = document.createElement('div');
        leftCol.className = 'cp-col';

        var todoCard = document.createElement('div');
        todoCard.className = 'cp-card';
        todoCard.innerHTML = '<h3 class="cp-card-title">To Do</h3>';

        // To Do row builder
        function todoRow(iconText, iconColor, title, sub, count, targetTab) {
          var row = document.createElement('div');
          row.className = 'cp-todo-row' + (targetTab ? ' clickable' : '');
          row.innerHTML =
            '<div class="cp-todo-icon ' + iconColor + '">' + iconText + '</div>' +
            '<div class="cp-todo-text">' +
              '<div class="cp-todo-title">' + title + '</div>' +
              '<div class="cp-todo-sub">' + sub + '</div>' +
            '</div>' +
            '<div class="cp-todo-count">' + count + '</div>';
          if (targetTab) {
            row.addEventListener('click', function () { setActiveTab(targetTab); });
          }
          return row;
        }

        todoCard.appendChild(todoRow(
          '✓', 'peach', 'Pending Reviews', 'Content awaiting approval',
          pendingApprovals, pendingApprovals > 0 ? 'approvals' : null));
        todoCard.appendChild(todoRow(
          '📋', 'blue', 'Forms to Complete', 'Information your team needs',
          pendingForms, pendingForms > 0 ? 'materials' : null));
        todoCard.appendChild(todoRow(
          '💬', 'mint', 'Messages', 'Chat with your ProAgri team',
          '', null));
        leftCol.appendChild(todoCard);

        // ── RIGHT column ──
        var rightCol = document.createElement('div');
        rightCol.className = 'cp-col';

        var msgCard = document.createElement('div');
        msgCard.className = 'cp-card cp-messages-card';
        msgCard.innerHTML = '<h3 class="cp-card-title">Messages</h3><div id="cpChatMount"></div>';
        rightCol.appendChild(msgCard);

        grid.appendChild(leftCol);
        grid.appendChild(rightCol);
        el.appendChild(grid);

        // Mount the embedded chat widget
        var chatMount = el.querySelector('#cpChatMount');
        if (chatMount) mountChat(chatMount);
      });
  }

  function updateBellBadge() {
    var badge = document.getElementById('cpBellBadge');
    if (!badge) return;
    var d = dashboardSnapshot || {};
    var total = (d.pendingFormCount || 0) + (d.pendingApprovalCount || 0);
    if (total > 0) {
      badge.textContent = total > 9 ? '9+' : String(total);
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  }

  // ========== EMBEDDED CHAT ==========
  // Mounts a compact chat UI into the given container. Polls GET
  // /:token/messages every 5 seconds to pick up CRM-side replies.
  // Posts via POST /:token/messages. Scrolls to bottom on new messages.
  var _chatPollTimer = null;
  function mountChat(container) {
    while (container.firstChild) container.removeChild(container.firstChild);

    var wrap = document.createElement('div');
    wrap.className = 'cp-chat';

    var body = document.createElement('div');
    body.className = 'cp-chat-body';
    wrap.appendChild(body);

    container.appendChild(wrap);

    // Send row sits OUTSIDE the chat shell so it visually matches the
    // screenshot's bordered input + Send button below the chat area.
    var inputRow = document.createElement('div');
    inputRow.className = 'cp-chat-input-row';
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'cp-chat-input';
    input.placeholder = 'Type a message...';
    inputRow.appendChild(input);
    var sendBtn = document.createElement('button');
    sendBtn.className = 'cp-chat-send';
    sendBtn.textContent = 'Send';
    inputRow.appendChild(sendBtn);
    container.appendChild(inputRow);

    var lastMessageCount = 0;
    var isAtBottom = true;

    body.addEventListener('scroll', function () {
      // Only auto-scroll on new messages if the user was already at the bottom
      isAtBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
    });

    function render(messages) {
      while (body.firstChild) body.removeChild(body.firstChild);
      if (!messages || messages.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'cp-chat-empty';
        empty.textContent = 'No messages yet.';
        body.appendChild(empty);
        return;
      }
      messages.forEach(function (m) {
        var msg = document.createElement('div');
        msg.className = 'cp-msg cp-msg-' + (m.senderType === 'client' ? 'client' : 'employee');

        var avatar = document.createElement('div');
        avatar.className = 'cp-msg-avatar';
        if (m.senderType === 'employee' && m.senderPhotoUrl) {
          var img = document.createElement('img');
          img.src = m.senderPhotoUrl;
          img.alt = m.senderFirstName || '';
          avatar.appendChild(img);
        } else if (m.senderType === 'employee') {
          avatar.textContent = ((m.senderFirstName || '').charAt(0) + (m.senderLastName || '').charAt(0)).toUpperCase() || 'T';
        } else {
          avatar.textContent = 'You';
          avatar.style.fontSize = '9px';
        }
        msg.appendChild(avatar);

        var content = document.createElement('div');
        var bubble = document.createElement('div');
        bubble.className = 'cp-msg-bubble';
        bubble.textContent = m.content;
        content.appendChild(bubble);

        var meta = document.createElement('div');
        meta.className = 'cp-msg-meta';
        var senderName = m.senderType === 'client'
          ? 'You'
          : ((m.senderFirstName || '') + ' ' + (m.senderLastName || '')).trim() || 'ProAgri Team';
        meta.textContent = senderName + ' · ' + formatRelativeTime(m.createdAt);
        content.appendChild(meta);

        msg.appendChild(content);
        body.appendChild(msg);
      });
    }

    function poll() {
      fetch('/api/portal/' + token + '/messages')
        .then(function (r) { return r.json(); })
        .then(function (messages) {
          if (!Array.isArray(messages)) return;
          var newCount = messages.length;
          var hadNew = newCount > lastMessageCount;
          lastMessageCount = newCount;
          render(messages);
          if (hadNew && isAtBottom) {
            body.scrollTop = body.scrollHeight;
          }
        })
        .catch(function (err) { console.error('Chat poll error:', err); });
    }

    function send() {
      var text = input.value.trim();
      if (!text) return;
      sendBtn.disabled = true;
      fetch('/api/portal/' + token + '/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: text })
      }).then(function (r) { return r.json(); })
        .then(function () {
          input.value = '';
          sendBtn.disabled = false;
          isAtBottom = true; // ensure we scroll to the new message
          poll();
        }).catch(function () {
          sendBtn.disabled = false;
        });
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); send(); }
    });

    // Initial load + 5s polling
    poll();
    if (_chatPollTimer) clearInterval(_chatPollTimer);
    _chatPollTimer = setInterval(poll, 5000);
  }

  function formatRelativeTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    var diffMs = Date.now() - d.getTime();
    var sec = Math.floor(diffMs / 1000);
    if (sec < 10) return 'just now';
    if (sec < 60) return sec + 's ago';
    var min = Math.floor(sec / 60);
    if (min < 60) return min + 'm ago';
    var hr = Math.floor(min / 60);
    if (hr < 24) return hr + 'h ago';
    var day = Math.floor(hr / 24);
    if (day < 7) return day + 'd ago';
    return d.toLocaleDateString();
  }

  // ========== REQUEST MATERIALS ==========
  // Renders forms built with the multi-field form builder. Each "card"
  // has a question + one or more fields. Legacy single-field cards
  // (shape: { question, fieldType }) are wrapped on the fly so older
  // published forms still render.
  function renderMaterials(el) {
    fetch('/api/portal/' + token + '/forms')
      .then(function (r) { return r.json(); })
      .then(function (forms) {
        if (!forms || forms.length === 0) {
          el.innerHTML = '<div class="cp-empty">No forms yet. We\'ll let you know when we need something from you.</div>';
          return;
        }
        forms.forEach(function (form) {
          var card = document.createElement('div');
          card.className = 'cp-form-card';

          var title = document.createElement('h3');
          title.className = 'cp-form-title';
          title.textContent = form.name;
          card.appendChild(title);

          if (form.status === 'completed') {
            var done = document.createElement('div');
            done.className = 'cp-form-completed';
            done.textContent = '✓ Completed';
            card.appendChild(done);
            el.appendChild(card);
            return;
          }

          var responses = {};
          var rawCards = form.fields || [];

          rawCards.forEach(function (rawCard, cardIdx) {
            // Normalize to new multi-field shape
            var fields;
            if (rawCard && Array.isArray(rawCard.fields)) {
              fields = rawCard.fields;
            } else {
              // Legacy { question, fieldType } → wrap as single-field card
              fields = [{ fieldType: (rawCard && rawCard.fieldType) || 'text', label: '' }];
            }

            var group = document.createElement('div');
            group.className = 'cp-form-field';

            var q = document.createElement('div');
            q.className = 'fq';
            q.textContent = (cardIdx + 1) + '. ' + ((rawCard && rawCard.question) || '');
            group.appendChild(q);

            fields.forEach(function (f, fIdx) {
              var responseKey = cardIdx + '_' + fIdx;

              // Optional per-field label (when multiple fields share a question)
              if (f.label && fields.length > 1) {
                var lbl = document.createElement('div');
                lbl.style.cssText = 'font-size:12px;color:var(--cp-text-muted);margin:8px 0 4px;font-weight:600;';
                lbl.textContent = f.label;
                group.appendChild(lbl);
              }

              var input;
              if (f.fieldType === 'textarea') {
                input = document.createElement('textarea');
              } else if (f.fieldType === 'file') {
                input = document.createElement('input');
                input.type = 'file';
                input.multiple = true;
              } else if (f.fieldType === 'date') {
                input = document.createElement('input');
                input.type = 'date';
              } else if (f.fieldType === 'number') {
                input = document.createElement('input');
                input.type = 'number';
              } else {
                input = document.createElement('input');
                input.type = 'text';
              }
              if (fields.length > 1) input.style.marginBottom = '8px';

              input.addEventListener('change', function () {
                if (f.fieldType === 'file') {
                  responses[responseKey] = Array.from(input.files).map(function (file) { return file.name; });
                } else {
                  responses[responseKey] = input.value;
                }
              });
              group.appendChild(input);
            });

            card.appendChild(group);
          });

          var submitBtn = document.createElement('button');
          submitBtn.className = 'cp-form-submit';
          submitBtn.textContent = 'Submit';
          submitBtn.addEventListener('click', function () {
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            fetch('/api/portal/' + token + '/forms/' + form.token + '/submit', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ responses: responses })
            }).then(function (r) { return r.json(); })
              .then(function () { renderTab(); });
          });
          card.appendChild(submitBtn);
          el.appendChild(card);
        });
      });
  }

  // ========== APPROVALS ==========
  function renderApprovals(el) {
    fetch('/api/portal/' + token + '/approvals')
      .then(function (r) { return r.json(); })
      .then(function (items) {
        if (!items || items.length === 0) {
          el.innerHTML = '<div class="cp-empty">No deliverables pending approval right now.</div>';
          return;
        }
        items.forEach(function (d) {
          // Branch: content-calendar gets its own per-post approval UX
          if (d.type === 'sm-content-calendar') {
            el.appendChild(buildCcApprovalCard(d));
            return;
          }
          // Branch: agri4all-posts gets its own per-post-type approval UX
          if (d.type === 'agri4all-posts') {
            el.appendChild(buildA4aPostsApprovalCard(d));
            return;
          }

          var card = document.createElement('div');
          card.className = 'cp-approval-card';

          var title = document.createElement('h3');
          title.className = 'cp-approval-title';
          title.textContent = d.title || 'Untitled';
          card.appendChild(title);

          var meta = document.createElement('div');
          meta.className = 'cp-approval-meta';
          meta.textContent = (d.type || '') + (d.deliveryMonth ? ' · ' + d.deliveryMonth : '');
          card.appendChild(meta);

          var changesLeft = 3 - (d.changeRequestCount || 0);
          var counter = document.createElement('span');
          counter.className = 'cp-change-counter' + (changesLeft <= 0 ? ' exhausted' : '');
          counter.textContent = changesLeft + ' of 3 change requests remaining';
          card.appendChild(counter);

          // Show posts if content calendar
          var meta2 = d.metadata || {};
          if (typeof meta2 === 'string') try { meta2 = JSON.parse(meta2); } catch (e) { meta2 = {}; }
          var posts = meta2.posts || [];
          var editedCaptions = {};

          posts.forEach(function (post, idx) {
            var pCard = document.createElement('div');
            pCard.className = 'cp-post-card';
            var date = document.createElement('div');
            date.className = 'cp-post-date';
            date.textContent = post.date || 'Post ' + (idx + 1);
            pCard.appendChild(date);
            var cap = document.createElement('div');
            cap.className = 'cp-post-caption';
            cap.contentEditable = 'true';
            cap.innerHTML = post.caption || '';
            cap.addEventListener('blur', function () {
              editedCaptions[idx] = cap.innerHTML;
            });
            pCard.appendChild(cap);
            if (post.images && post.images.length > 0) {
              var imgs = document.createElement('div');
              imgs.className = 'cp-post-images';
              post.images.forEach(function (url) {
                var img = document.createElement('img');
                img.src = url;
                img.addEventListener('click', function () { openLightbox(url); });
                imgs.appendChild(img);
              });
              pCard.appendChild(imgs);
            }
            card.appendChild(pCard);
          });

          var actions = document.createElement('div');
          actions.className = 'cp-approval-actions';

          var approveBtn = document.createElement('button');
          approveBtn.className = 'cp-btn cp-btn-approve';
          approveBtn.textContent = '✓ Approve';
          approveBtn.addEventListener('click', function () {
            if (!confirm('Approve this deliverable?')) return;
            fetch('/api/portal/' + token + '/approvals/' + d.id + '/approve', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' }
            }).then(function () { renderTab(); });
          });
          actions.appendChild(approveBtn);

          var changesBtn = document.createElement('button');
          changesBtn.className = 'cp-btn cp-btn-changes';
          changesBtn.textContent = 'Request Changes';
          changesBtn.disabled = changesLeft <= 0;
          var changesBox = document.createElement('div');
          changesBox.className = 'cp-changes-box';
          var changesNotes = document.createElement('textarea');
          changesNotes.placeholder = 'Describe what changes you\'d like...';
          changesBox.appendChild(changesNotes);
          var sendChangesBtn = document.createElement('button');
          sendChangesBtn.className = 'cp-btn cp-btn-changes';
          sendChangesBtn.textContent = 'Send Changes';
          sendChangesBtn.style.marginTop = '10px';
          sendChangesBtn.addEventListener('click', function () {
            var notes = changesNotes.value.trim();
            if (!notes) { alert('Please describe the changes'); return; }
            sendChangesBtn.disabled = true;
            sendChangesBtn.textContent = 'Sending...';
            fetch('/api/portal/' + token + '/approvals/' + d.id + '/request-changes', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                change_notes: notes,
                post_updates: editedCaptions
              })
            }).then(function (r) { return r.json(); })
              .then(function (res) {
                if (res.error) alert(res.error);
                renderTab();
              });
          });
          changesBox.appendChild(sendChangesBtn);

          changesBtn.addEventListener('click', function () {
            changesBox.classList.toggle('open');
          });
          actions.appendChild(changesBtn);
          card.appendChild(actions);
          card.appendChild(changesBox);

          el.appendChild(card);
        });
      });
  }

  // ========== CONTENT CALENDAR APPROVAL UX ==========
  var CC_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function ccPlainText(html) {
    var div = document.createElement('div');
    div.innerHTML = html || '';
    return (div.textContent || '').trim();
  }

  function ccExtractMonthYear(d) {
    var dm = d.deliveryMonth || '';
    var m = /^(\d{4})-(\d{2})/.exec(dm);
    if (m) {
      var yr = parseInt(m[1], 10);
      var mo = parseInt(m[2], 10) - 1;
      if (mo >= 0 && mo < 12) return CC_MONTHS[mo] + ' ' + yr;
    }
    // Fallback: parse from title
    var t = d.title || '';
    var tm = /(January|February|March|April|May|June|July|August|September|October|November|December)\s*(\d{4})/i.exec(t);
    if (tm) return tm[1].charAt(0).toUpperCase() + tm[1].slice(1).toLowerCase() + ' ' + tm[2];
    return dm || '';
  }

  function ccStatusLabel(s) {
    if (s === 'approved') return 'Approved';
    if (s === 'changes_requested') return 'Changes Requested';
    return 'Pending';
  }

  function ccParseMeta(d) {
    var m = d.metadata || {};
    if (typeof m === 'string') { try { m = JSON.parse(m); } catch (e) { m = {}; } }
    return m;
  }

  function buildCcApprovalCard(d) {
    var state = {
      deliverable: d,
      meta: ccParseMeta(d),
      changesLeft: 3 - (d.changeRequestCount || 0)
    };
    state.posts = state.meta.posts || [];

    var card = document.createElement('div');
    card.className = 'cp-cc-card';

    var header = document.createElement('div');
    header.className = 'cp-cc-header';

    var h3 = document.createElement('h3');
    var clientName = d.clientName || state.meta.clientName || '';
    var monthYear = ccExtractMonthYear(d);
    h3.textContent = (clientName ? clientName + ' — ' : '') + 'Content Calendar' + (monthYear ? ', ' + monthYear : '');
    header.appendChild(h3);

    var revisions = document.createElement('div');
    revisions.className = 'cp-cc-revisions' + (state.changesLeft <= 0 ? ' exhausted' : '');
    revisions.textContent = state.changesLeft + ' of 3 change requests remaining';
    header.appendChild(revisions);
    card.appendChild(header);
    state.revisionsEl = revisions;

    var grid = document.createElement('div');
    grid.className = 'cp-cc-grid';

    state.posts.forEach(function (post, idx) {
      var p = document.createElement('div');
      p.className = 'cp-cc-post';
      p.setAttribute('data-idx', String(idx));
      p.setAttribute('data-status', post.status || 'pending');

      var img = document.createElement('img');
      img.className = 'cp-cc-post-img';
      img.src = (post.images && post.images[0]) || 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180"><rect width="180" height="180" fill="%23eff1f5"/><text x="50%25" y="50%25" font-family="sans-serif" font-size="14" fill="%238b8f9c" text-anchor="middle" dominant-baseline="middle">No image</text></svg>');
      img.alt = '';
      p.appendChild(img);

      var capSnippet = document.createElement('div');
      capSnippet.className = 'cp-cc-post-caption';
      var plain = ccPlainText(post.caption);
      capSnippet.textContent = plain.length > 80 ? plain.slice(0, 80) + '...' : (plain || 'No caption');
      p.appendChild(capSnippet);

      var status = document.createElement('div');
      status.className = 'cp-cc-post-status';
      status.textContent = ccStatusLabel(post.status);
      p.appendChild(status);

      p.addEventListener('click', function () { openCcModal(state, idx); });
      grid.appendChild(p);
    });

    card.appendChild(grid);
    return card;
  }

  function openCcModal(state, postIdx) {
    var post = state.posts[postIdx];
    var images = (post.images && post.images.length > 0) ? post.images.slice() : [];
    var currentImg = 0;

    var overlay = document.createElement('div');
    overlay.className = 'cp-cc-modal-overlay';

    var panel = document.createElement('div');
    panel.className = 'cp-cc-modal-panel';

    var closeBtn = document.createElement('button');
    closeBtn.className = 'cp-cc-modal-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.addEventListener('click', function () { overlay.remove(); });
    panel.appendChild(closeBtn);

    var body = document.createElement('div');
    body.className = 'cp-cc-modal-body';

    var media = document.createElement('div');
    media.className = 'cp-cc-modal-media';

    var mainImg = document.createElement('img');
    function renderImg() {
      if (images.length > 0) {
        mainImg.src = images[currentImg];
        mainImg.style.display = 'block';
      } else {
        mainImg.style.display = 'none';
      }
    }
    media.appendChild(mainImg);
    renderImg();

    if (images.length > 1) {
      var prev = document.createElement('button');
      prev.className = 'cp-cc-nav prev';
      prev.innerHTML = '&#8249;';
      prev.addEventListener('click', function (e) {
        e.stopPropagation();
        currentImg = (currentImg - 1 + images.length) % images.length;
        renderImg();
      });
      var next = document.createElement('button');
      next.className = 'cp-cc-nav next';
      next.innerHTML = '&#8250;';
      next.addEventListener('click', function (e) {
        e.stopPropagation();
        currentImg = (currentImg + 1) % images.length;
        renderImg();
      });
      media.appendChild(prev);
      media.appendChild(next);
    }
    body.appendChild(media);

    var form = document.createElement('div');
    form.className = 'cp-cc-modal-form';

    var capLabel = document.createElement('label');
    capLabel.textContent = 'Caption';
    form.appendChild(capLabel);

    var capArea = document.createElement('textarea');
    capArea.className = 'cp-cc-modal-caption';
    capArea.value = ccPlainText(post.caption);
    form.appendChild(capArea);

    var chLabel = document.createElement('label');
    chLabel.textContent = 'Change request';
    form.appendChild(chLabel);

    var chArea = document.createElement('textarea');
    chArea.className = 'cp-cc-modal-changes';
    chArea.placeholder = "Describe the changes you'd like...";
    form.appendChild(chArea);

    var errBox = document.createElement('div');
    errBox.className = 'cp-cc-modal-error';
    form.appendChild(errBox);

    var actions = document.createElement('div');
    actions.className = 'cp-cc-modal-actions';

    var requestBtn = document.createElement('button');
    requestBtn.className = 'cp-cc-request-btn';
    function setRequestLabel() {
      if (state.changesLeft <= 0) {
        requestBtn.textContent = 'No changes remaining';
        requestBtn.disabled = true;
      } else {
        requestBtn.textContent = 'Request Changes (' + state.changesLeft + ' of 3 remaining)';
        requestBtn.disabled = false;
      }
    }
    setRequestLabel();

    var approveBtn = document.createElement('button');
    approveBtn.className = 'cp-cc-approve-btn';
    approveBtn.textContent = 'Approve Post';

    // If already approved, lock the buttons
    if (post.status === 'approved') {
      approveBtn.disabled = true;
      approveBtn.textContent = 'Already Approved';
      requestBtn.disabled = true;
    }

    function showErr(msg) { errBox.textContent = msg; errBox.classList.add('open'); }
    function clearErr() { errBox.classList.remove('open'); errBox.textContent = ''; }

    approveBtn.addEventListener('click', function () {
      clearErr();
      approveBtn.disabled = true;
      approveBtn.textContent = 'Approving...';
      fetch('/api/portal/' + token + '/approvals/' + state.deliverable.id + '/posts/' + postIdx + '/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      }).then(function (r) {
        return r.json().then(function (body) { return { ok: r.ok, body: body }; });
      }).then(function (res) {
        if (!res.ok) {
          approveBtn.disabled = false;
          approveBtn.textContent = 'Approve Post';
          showErr((res.body && res.body.error) || 'Failed to approve post');
          return;
        }
        post.status = 'approved';
        updateCcPostCard(state, postIdx);
        overlay.remove();
        if (res.body && res.body.deliverable && res.body.deliverable.status === 'approved') {
          renderTab();
        }
      }).catch(function () {
        approveBtn.disabled = false;
        approveBtn.textContent = 'Approve Post';
        showErr('Network error');
      });
    });

    requestBtn.addEventListener('click', function () {
      clearErr();
      var text = chArea.value.trim();
      var caption = capArea.value;
      if (!text) { showErr('Please describe the changes you would like.'); return; }
      requestBtn.disabled = true;
      requestBtn.textContent = 'Sending...';
      fetch('/api/portal/' + token + '/approvals/' + state.deliverable.id + '/posts/' + postIdx + '/request-changes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, caption: caption, images: post.images || [] })
      }).then(function (r) {
        return r.json().then(function (body) { return { ok: r.ok, status: r.status, body: body }; });
      }).then(function (res) {
        if (!res.ok) {
          setRequestLabel();
          if (res.status === 400 && res.body && /Maximum change requests/i.test(res.body.error || '')) {
            state.changesLeft = 0;
            setRequestLabel();
            updateCcRevisionCounter(state);
            showErr(res.body.error);
          } else {
            showErr((res.body && res.body.error) || 'Failed to request changes');
          }
          return;
        }
        post.status = 'changes_requested';
        post.caption = caption;
        state.changesLeft = Math.max(0, state.changesLeft - 1);
        updateCcPostCard(state, postIdx);
        updateCcRevisionCounter(state);
        overlay.remove();
      }).catch(function () {
        setRequestLabel();
        showErr('Network error');
      });
    });

    actions.appendChild(requestBtn);
    actions.appendChild(approveBtn);
    form.appendChild(actions);
    body.appendChild(form);
    panel.appendChild(body);
    overlay.appendChild(panel);

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) overlay.remove();
    });

    document.body.appendChild(overlay);
  }

  function updateCcPostCard(state, postIdx) {
    // Find the card via data attributes — scoped to the approvals container
    var cards = document.querySelectorAll('.cp-cc-post[data-idx="' + postIdx + '"]');
    cards.forEach(function (p) {
      // Only update ones that belong to this deliverable's grid. Safest: check ancestor card contains our revisions element.
      var parentCard = p.closest('.cp-cc-card');
      if (!parentCard || !parentCard.contains(state.revisionsEl)) return;
      var post = state.posts[postIdx];
      p.setAttribute('data-status', post.status || 'pending');
      var statusEl = p.querySelector('.cp-cc-post-status');
      if (statusEl) statusEl.textContent = ccStatusLabel(post.status);
      var capEl = p.querySelector('.cp-cc-post-caption');
      if (capEl) {
        var plain = ccPlainText(post.caption);
        capEl.textContent = plain.length > 80 ? plain.slice(0, 80) + '...' : (plain || 'No caption');
      }
    });
  }

  function updateCcRevisionCounter(state) {
    if (!state.revisionsEl) return;
    state.revisionsEl.textContent = state.changesLeft + ' of 3 change requests remaining';
    state.revisionsEl.classList.toggle('exhausted', state.changesLeft <= 0);
  }

  // ========== AGRI4ALL POSTS PER-POST-TYPE APPROVAL UX ==========
  var A4A_POST_TYPES = [
    { key: 'facebook_posts',    label: 'Facebook Post',    pillClass: 'cp-a4a-pill-fb' },
    { key: 'instagram_posts',   label: 'Instagram Post',   pillClass: 'cp-a4a-pill-ig' },
    { key: 'instagram_stories', label: 'Instagram Story',  pillClass: 'cp-a4a-pill-ig-story' }
  ];

  function a4aStatusLabel(s) {
    if (s === 'approved') return 'Approved';
    if (s === 'changes_requested') return 'Changes Requested';
    return 'Pending';
  }

  function buildA4aPostsApprovalCard(d) {
    var meta = d.metadata || {};
    if (typeof meta === 'string') { try { meta = JSON.parse(meta); } catch (e) { meta = {}; } }
    var sections = meta.sections || {};

    var wrap = document.createElement('div');
    wrap.className = 'cp-a4a-wrap';

    var title = document.createElement('h3');
    title.className = 'cp-a4a-wrap-title';
    var clientName = d.clientName || meta.clientName || '';
    title.textContent = (clientName ? clientName + ' — ' : '') + (d.title || 'Agri4All Posts');
    wrap.appendChild(title);

    var enabled = A4A_POST_TYPES.filter(function (t) { return meta[t.key] === true; });
    if (enabled.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'cp-empty';
      empty.textContent = 'No post types enabled on this deliverable.';
      wrap.appendChild(empty);
      return wrap;
    }

    enabled.forEach(function (t) {
      wrap.appendChild(buildA4aSectionCard(d, t, sections[t.key] || {}));
    });
    return wrap;
  }

  function buildA4aSectionCard(deliverable, typeDef, section) {
    var state = {
      deliverable: deliverable,
      typeDef: typeDef,
      section: section,
      files: Array.isArray(section.files) ? section.files.slice() : [],
      changeCount: parseInt(section.change_request_count || 0, 10) || 0,
      status: section.status || 'pending'
    };
    state.changesLeft = Math.max(0, 3 - state.changeCount);

    var card = document.createElement('div');
    card.className = 'cp-cc-card cp-a4a-card';
    card.setAttribute('data-a4a-key', typeDef.key);
    card.setAttribute('data-status', state.status);

    var header = document.createElement('div');
    header.className = 'cp-cc-header';

    var pill = document.createElement('span');
    pill.className = 'cp-a4a-pill ' + typeDef.pillClass;
    pill.textContent = typeDef.label;
    header.appendChild(pill);

    var revisions = document.createElement('div');
    revisions.className = 'cp-cc-revisions' + (state.changesLeft <= 0 ? ' exhausted' : '');
    revisions.textContent = state.changesLeft + ' of 3 change requests remaining';
    header.appendChild(revisions);
    state.revisionsEl = revisions;

    card.appendChild(header);

    // Image grid
    var grid = document.createElement('div');
    grid.className = 'cp-a4a-grid';
    if (state.files.length === 0) {
      var none = document.createElement('div');
      none.className = 'cp-a4a-empty';
      none.textContent = 'No files uploaded yet.';
      grid.appendChild(none);
    } else {
      state.files.forEach(function (url, idx) {
        var isImage = /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(url);
        var thumb = document.createElement('div');
        thumb.className = 'cp-a4a-thumb';
        if (isImage) {
          var img = document.createElement('img');
          img.src = url;
          img.alt = '';
          thumb.appendChild(img);
          thumb.addEventListener('click', function () { openA4aLightbox(state.files, idx); });
        } else {
          var link = document.createElement('a');
          link.href = url;
          link.target = '_blank';
          link.textContent = url.split('/').pop();
          link.className = 'cp-a4a-file-link';
          thumb.appendChild(link);
        }
        grid.appendChild(thumb);
      });
    }
    card.appendChild(grid);

    // Status badge row
    var statusRow = document.createElement('div');
    statusRow.className = 'cp-a4a-status-row';
    var statusBadge = document.createElement('span');
    statusBadge.className = 'cp-a4a-status-badge';
    statusBadge.textContent = a4aStatusLabel(state.status);
    statusRow.appendChild(statusBadge);
    card.appendChild(statusRow);
    state.statusBadgeEl = statusBadge;

    // Actions
    var actions = document.createElement('div');
    actions.className = 'cp-cc-modal-actions';

    var requestBtn = document.createElement('button');
    requestBtn.className = 'cp-cc-request-btn';
    var approveBtn = document.createElement('button');
    approveBtn.className = 'cp-cc-approve-btn';
    approveBtn.textContent = 'Approve Section';

    function refreshButtons() {
      if (state.status === 'approved') {
        approveBtn.disabled = true;
        approveBtn.textContent = 'Approved';
        requestBtn.disabled = true;
        requestBtn.textContent = 'Changes Unavailable';
        return;
      }
      approveBtn.disabled = false;
      approveBtn.textContent = 'Approve Section';
      if (state.changesLeft <= 0) {
        requestBtn.disabled = true;
        requestBtn.textContent = 'No changes remaining';
      } else {
        requestBtn.disabled = false;
        requestBtn.textContent = 'Request Changes (' + state.changesLeft + ' of 3 remaining)';
      }
    }
    refreshButtons();

    var errBox = document.createElement('div');
    errBox.className = 'cp-cc-modal-error';
    function showErr(msg) { errBox.textContent = msg; errBox.classList.add('open'); }
    function clearErr() { errBox.classList.remove('open'); errBox.textContent = ''; }

    approveBtn.addEventListener('click', function () {
      clearErr();
      approveBtn.disabled = true;
      approveBtn.textContent = 'Approving...';
      fetch('/api/portal/' + token + '/approvals/' + state.deliverable.id + '/sections/' + state.typeDef.key + '/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      }).then(function (r) {
        return r.json().then(function (body) { return { ok: r.ok, body: body }; });
      }).then(function (res) {
        if (!res.ok) {
          refreshButtons();
          showErr((res.body && res.body.error) || 'Failed to approve section');
          return;
        }
        state.status = 'approved';
        card.setAttribute('data-status', 'approved');
        state.statusBadgeEl.textContent = a4aStatusLabel('approved');
        refreshButtons();
        if (res.body && res.body.deliverable && res.body.deliverable.status === 'approved') {
          renderTab();
        }
      }).catch(function () {
        refreshButtons();
        showErr('Network error');
      });
    });

    requestBtn.addEventListener('click', function () {
      if (state.changesLeft <= 0 || state.status === 'approved') return;
      openA4aRequestChangesModal(state, card, refreshButtons);
    });

    actions.appendChild(requestBtn);
    actions.appendChild(approveBtn);
    card.appendChild(errBox);
    card.appendChild(actions);

    return card;
  }

  function openA4aLightbox(files, startIdx) {
    var images = files.filter(function (u) { return /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(u); });
    if (images.length === 0) return;
    var current = Math.max(0, images.indexOf(files[startIdx]));
    if (current < 0) current = 0;

    var overlay = document.createElement('div');
    overlay.className = 'cp-cc-modal-overlay';
    var panel = document.createElement('div');
    panel.className = 'cp-cc-modal-panel';
    var closeBtn = document.createElement('button');
    closeBtn.className = 'cp-cc-modal-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.addEventListener('click', function () { overlay.remove(); });
    panel.appendChild(closeBtn);

    var body = document.createElement('div');
    body.className = 'cp-cc-modal-body';
    var media = document.createElement('div');
    media.className = 'cp-cc-modal-media';
    var mainImg = document.createElement('img');
    function renderImg() { mainImg.src = images[current]; }
    media.appendChild(mainImg);
    renderImg();

    if (images.length > 1) {
      var prev = document.createElement('button');
      prev.className = 'cp-cc-nav prev';
      prev.innerHTML = '&#8249;';
      prev.addEventListener('click', function (e) {
        e.stopPropagation();
        current = (current - 1 + images.length) % images.length;
        renderImg();
      });
      var next = document.createElement('button');
      next.className = 'cp-cc-nav next';
      next.innerHTML = '&#8250;';
      next.addEventListener('click', function (e) {
        e.stopPropagation();
        current = (current + 1) % images.length;
        renderImg();
      });
      media.appendChild(prev);
      media.appendChild(next);
    }
    body.appendChild(media);
    panel.appendChild(body);
    overlay.appendChild(panel);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  }

  function openA4aRequestChangesModal(state, card, refreshButtons) {
    var overlay = document.createElement('div');
    overlay.className = 'cp-cc-modal-overlay';
    var panel = document.createElement('div');
    panel.className = 'cp-cc-modal-panel cp-a4a-request-panel';

    var closeBtn = document.createElement('button');
    closeBtn.className = 'cp-cc-modal-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.addEventListener('click', function () { overlay.remove(); });
    panel.appendChild(closeBtn);

    var body = document.createElement('div');
    body.className = 'cp-cc-modal-body';
    var form = document.createElement('div');
    form.className = 'cp-cc-modal-form';

    var heading = document.createElement('label');
    heading.textContent = 'Request changes — ' + state.typeDef.label;
    form.appendChild(heading);

    var chArea = document.createElement('textarea');
    chArea.className = 'cp-cc-modal-changes';
    chArea.placeholder = "Describe the changes you'd like...";
    form.appendChild(chArea);

    var imgLabel = document.createElement('label');
    imgLabel.textContent = 'Attach reference images (optional)';
    form.appendChild(imgLabel);

    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.multiple = true;
    form.appendChild(fileInput);

    var uploadedUrls = [];
    var uploadStatus = document.createElement('div');
    uploadStatus.style.cssText = 'font-size:11px;color:var(--cp-text-muted);';
    form.appendChild(uploadStatus);

    fileInput.addEventListener('change', function () {
      var files = Array.from(fileInput.files || []);
      if (files.length === 0) return;
      var fd = new FormData();
      files.forEach(function (f) { fd.append('images', f); });
      uploadStatus.textContent = 'Uploading ' + files.length + ' file(s)...';
      fetch('/api/deliverables/' + state.deliverable.id + '/upload-images', {
        method: 'POST',
        body: fd
      }).then(function (r) { return r.json(); })
        .then(function (result) {
          if (result && result.urls) {
            uploadedUrls = uploadedUrls.concat(result.urls);
            uploadStatus.textContent = uploadedUrls.length + ' file(s) ready to attach.';
          } else {
            uploadStatus.textContent = 'Upload failed.';
          }
        })
        .catch(function () { uploadStatus.textContent = 'Upload failed.'; });
    });

    var errBox = document.createElement('div');
    errBox.className = 'cp-cc-modal-error';
    form.appendChild(errBox);
    function showErr(msg) { errBox.textContent = msg; errBox.classList.add('open'); }
    function clearErr() { errBox.classList.remove('open'); errBox.textContent = ''; }

    var actions = document.createElement('div');
    actions.className = 'cp-cc-modal-actions';
    var cancelBtn = document.createElement('button');
    cancelBtn.className = 'cp-cc-request-btn';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', function () { overlay.remove(); });

    var sendBtn = document.createElement('button');
    sendBtn.className = 'cp-cc-approve-btn';
    sendBtn.textContent = 'Send Request';
    sendBtn.addEventListener('click', function () {
      clearErr();
      var text = chArea.value.trim();
      if (!text) { showErr('Please describe the changes you would like.'); return; }
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';
      fetch('/api/portal/' + token + '/approvals/' + state.deliverable.id + '/sections/' + state.typeDef.key + '/request-changes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, images: uploadedUrls })
      }).then(function (r) {
        return r.json().then(function (body) { return { ok: r.ok, status: r.status, body: body }; });
      }).then(function (res) {
        if (!res.ok) {
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send Request';
          if (res.status === 400 && res.body && /Maximum change requests/i.test(res.body.error || '')) {
            state.changesLeft = 0;
          }
          showErr((res.body && res.body.error) || 'Failed to request changes');
          if (state.revisionsEl) {
            state.revisionsEl.textContent = state.changesLeft + ' of 3 change requests remaining';
            state.revisionsEl.classList.toggle('exhausted', state.changesLeft <= 0);
          }
          refreshButtons();
          return;
        }
        state.status = 'changes_requested';
        state.changeCount = state.changeCount + 1;
        state.changesLeft = Math.max(0, 3 - state.changeCount);
        card.setAttribute('data-status', 'changes_requested');
        if (state.statusBadgeEl) state.statusBadgeEl.textContent = a4aStatusLabel('changes_requested');
        if (state.revisionsEl) {
          state.revisionsEl.textContent = state.changesLeft + ' of 3 change requests remaining';
          state.revisionsEl.classList.toggle('exhausted', state.changesLeft <= 0);
        }
        refreshButtons();
        overlay.remove();
      }).catch(function () {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Request';
        showErr('Network error');
      });
    });

    actions.appendChild(cancelBtn);
    actions.appendChild(sendBtn);
    form.appendChild(actions);
    body.appendChild(form);
    panel.appendChild(body);
    overlay.appendChild(panel);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  }

  function openLightbox(url) {
    var lb = document.createElement('div');
    lb.className = 'cp-lightbox';
    var img = document.createElement('img');
    img.src = url;
    lb.appendChild(img);
    var close = document.createElement('button');
    close.className = 'close';
    close.textContent = '×';
    close.addEventListener('click', function () { lb.remove(); });
    lb.appendChild(close);
    lb.addEventListener('click', function (e) { if (e.target === lb) lb.remove(); });
    document.body.appendChild(lb);
  }
})();
</script>
</body>
</html>
