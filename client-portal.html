<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — ProAgri</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 0; color: #1e293b; }
  .cp-header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 16px 24px; position: sticky; top: 0; z-index: 10; }
  .cp-header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .cp-brand { font-size: 18px; font-weight: 700; color: #1e293b; }
  .cp-client-name { font-size: 13px; color: #64748b; margin-top: 2px; }
  .cp-tabs { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0 24px; position: sticky; top: 64px; z-index: 9; }
  .cp-tabs-inner { max-width: 1100px; margin: 0 auto; display: flex; gap: 8px; }
  .cp-tab { padding: 14px 20px; border: none; background: none; font-size: 14px; font-weight: 600; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; }
  .cp-tab:hover { color: #3b82f6; }
  .cp-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
  .cp-main { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
  .cp-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .cp-card-title { font-size: 15px; font-weight: 700; color: #1e293b; margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 0.04em; }
  .cp-empty { padding: 40px; text-align: center; color: #94a3b8; font-size: 14px; }
  .cp-stat { display: flex; align-items: center; gap: 16px; padding: 12px 16px; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 12px; }
  .cp-stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .cp-stat-text { flex: 1; }
  .cp-stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
  .cp-stat-value { font-size: 18px; font-weight: 700; color: #1e293b; }
  .cp-stat-action { padding: 6px 14px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .cp-form-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .cp-form-title { font-size: 16px; font-weight: 700; color: #1e293b; margin: 0 0 16px 0; }
  .cp-form-field { position: relative; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .cp-form-field .fq { font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 8px; }
  .cp-form-field input[type=text], .cp-form-field input[type=number], .cp-form-field input[type=date], .cp-form-field textarea { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; }
  .cp-form-field textarea { min-height: 80px; resize: vertical; }
  .cp-form-field input[type=file] { display: block; margin-top: 4px; font-size: 12px; }
  .cp-form-submit { padding: 10px 20px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .cp-form-submit:hover { background: #2563eb; }
  .cp-form-completed { padding: 12px; background: rgba(46,204,113,0.1); color: #27ae60; border-radius: 6px; font-size: 13px; font-weight: 600; text-align: center; }
  .cp-approval-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .cp-approval-title { font-size: 16px; font-weight: 700; color: #1e293b; margin: 0 0 8px 0; }
  .cp-approval-meta { font-size: 12px; color: #64748b; margin-bottom: 12px; }
  .cp-change-counter { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; background: rgba(245,166,35,0.1); color: #f5a623; }
  .cp-change-counter.exhausted { background: rgba(231,76,60,0.1); color: #e74c3c; }
  .cp-post-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin: 10px 0; }
  .cp-post-date { font-size: 12px; font-weight: 600; color: #64748b; }
  .cp-post-caption { margin: 8px 0; font-size: 13px; line-height: 1.5; color: #1e293b; min-height: 40px; outline: none; }
  .cp-post-caption:focus { background: #fff; border: 1px solid #3b82f6; border-radius: 4px; padding: 6px; }
  .cp-post-images { display: flex; gap: 6px; flex-wrap: wrap; }
  .cp-post-images img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; cursor: pointer; }
  .cp-approval-actions { display: flex; gap: 8px; margin-top: 16px; }
  .cp-btn { padding: 8px 16px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; font-size: 13px; font-weight: 600; color: #64748b; cursor: pointer; }
  .cp-btn-approve { background: #27ae60; color: #fff; border-color: #27ae60; }
  .cp-btn-approve:hover { background: #219653; }
  .cp-btn-changes { background: #f5a623; color: #fff; border-color: #f5a623; }
  .cp-btn-changes:hover { background: #e69509; }
  .cp-btn-changes:disabled { background: #ccc; cursor: not-allowed; }
  .cp-changes-box { margin-top: 12px; display: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; }
  .cp-changes-box.open { display: block; }
  .cp-changes-box textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-family: inherit; font-size: 13px; resize: vertical; }
  .cp-messenger-link { display: inline-block; padding: 8px 16px; background: #3b82f6; color: #fff; text-decoration: none; border-radius: 6px; font-size: 13px; font-weight: 600; }
  .cp-messenger-link:hover { background: #2563eb; }
  .cp-lightbox { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .cp-lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  .cp-lightbox .close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 24px; cursor: pointer; }
</style>
</head>
<body>

<div class="cp-header">
  <div class="cp-header-inner">
    <div>
      <div class="cp-brand">ProAgri Client Portal</div>
      <div class="cp-client-name" id="clientName">Loading...</div>
    </div>
  </div>
</div>

<div class="cp-tabs">
  <div class="cp-tabs-inner">
    <button class="cp-tab active" data-tab="dashboard">Dashboard</button>
    <button class="cp-tab" data-tab="materials">Request Materials</button>
    <button class="cp-tab" data-tab="approvals">Approvals</button>
  </div>
</div>

<div class="cp-main">
  <div id="content"></div>
</div>

<script>
(function () {
  'use strict';
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if (!token) {
    document.getElementById('content').innerHTML = '<div class="cp-empty">Invalid portal link.</div>';
    return;
  }

  var client = null;
  var currentTab = 'dashboard';

  // Fetch client info
  fetch('/api/portal/' + token + '/client')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.error) {
        document.getElementById('clientName').textContent = 'Invalid link';
        document.getElementById('content').innerHTML = '<div class="cp-empty">This portal link is invalid or expired.</div>';
        return;
      }
      client = data;
      document.getElementById('clientName').textContent = data.name || 'Client';
      document.title = 'Portal — ' + (data.name || '');
      renderTab();
    });

  // Tab switching
  document.querySelectorAll('.cp-tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.cp-tab').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderTab();
    });
  });

  function renderTab() {
    var el = document.getElementById('content');
    el.innerHTML = '';
    if (currentTab === 'dashboard') renderDashboard(el);
    else if (currentTab === 'materials') renderMaterials(el);
    else if (currentTab === 'approvals') renderApprovals(el);
  }

  // ========== DASHBOARD ==========
  function renderDashboard(el) {
    fetch('/api/portal/' + token + '/dashboard')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var html = '';

        // Pending forms stat
        html += '<div class="cp-stat">';
        html += '<div class="cp-stat-icon" style="background:rgba(59,130,246,0.1);color:#3b82f6;">📝</div>';
        html += '<div class="cp-stat-text">';
        html += '<div class="cp-stat-label">Forms Pending</div>';
        html += '<div class="cp-stat-value">' + data.pendingFormCount + '</div>';
        html += '</div>';
        if (data.pendingFormCount > 0) {
          html += '<button class="cp-stat-action" data-go="materials">Complete</button>';
        }
        html += '</div>';

        // Pending approvals stat
        html += '<div class="cp-stat">';
        html += '<div class="cp-stat-icon" style="background:rgba(245,166,35,0.1);color:#f5a623;">✓</div>';
        html += '<div class="cp-stat-text">';
        html += '<div class="cp-stat-label">Awaiting Approval</div>';
        html += '<div class="cp-stat-value">' + data.pendingApprovalCount + '</div>';
        html += '</div>';
        if (data.pendingApprovalCount > 0) {
          html += '<button class="cp-stat-action" data-go="approvals">Review</button>';
        }
        html += '</div>';

        // Messenger section
        html += '<div class="cp-card">';
        html += '<h2 class="cp-card-title">Messages</h2>';
        html += '<p style="font-size:13px;color:#64748b;margin:0 0 12px;">Chat with your ProAgri team about your campaign.</p>';
        html += '<a href="/messaging.html" target="_blank" class="cp-messenger-link">Open Messenger</a>';
        html += '</div>';

        el.innerHTML = html;

        el.querySelectorAll('[data-go]').forEach(function (b) {
          b.addEventListener('click', function () {
            currentTab = b.dataset.go;
            document.querySelectorAll('.cp-tab').forEach(function (t) {
              t.classList.toggle('active', t.dataset.tab === currentTab);
            });
            renderTab();
          });
        });
      });
  }

  // ========== REQUEST MATERIALS ==========
  function renderMaterials(el) {
    fetch('/api/portal/' + token + '/forms')
      .then(function (r) { return r.json(); })
      .then(function (forms) {
        if (!forms || forms.length === 0) {
          el.innerHTML = '<div class="cp-empty">No forms yet. We\'ll let you know when we need something from you.</div>';
          return;
        }
        forms.forEach(function (form) {
          var card = document.createElement('div');
          card.className = 'cp-form-card';

          var title = document.createElement('h3');
          title.className = 'cp-form-title';
          title.textContent = form.name;
          card.appendChild(title);

          if (form.status === 'completed') {
            var done = document.createElement('div');
            done.className = 'cp-form-completed';
            done.textContent = '✓ Completed';
            card.appendChild(done);
            el.appendChild(card);
            return;
          }

          var responses = {};
          (form.fields || []).forEach(function (f, idx) {
            var field = document.createElement('div');
            field.className = 'cp-form-field';

            var q = document.createElement('div');
            q.className = 'fq';
            q.textContent = (idx + 1) + '. ' + (f.question || '');
            field.appendChild(q);

            var input;
            if (f.fieldType === 'textarea') {
              input = document.createElement('textarea');
            } else if (f.fieldType === 'file') {
              input = document.createElement('input');
              input.type = 'file';
              input.multiple = true;
            } else if (f.fieldType === 'date') {
              input = document.createElement('input');
              input.type = 'date';
            } else if (f.fieldType === 'number') {
              input = document.createElement('input');
              input.type = 'number';
            } else {
              input = document.createElement('input');
              input.type = 'text';
            }

            input.addEventListener('change', function () {
              if (f.fieldType === 'file') {
                responses[idx] = Array.from(input.files).map(function (file) { return file.name; });
              } else {
                responses[idx] = input.value;
              }
            });
            field.appendChild(input);
            card.appendChild(field);
          });

          var submitBtn = document.createElement('button');
          submitBtn.className = 'cp-form-submit';
          submitBtn.textContent = 'Submit';
          submitBtn.addEventListener('click', function () {
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            fetch('/api/portal/' + token + '/forms/' + form.token + '/submit', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ responses: responses })
            }).then(function (r) { return r.json(); })
              .then(function () { renderTab(); });
          });
          card.appendChild(submitBtn);
          el.appendChild(card);
        });
      });
  }

  // ========== APPROVALS ==========
  function renderApprovals(el) {
    fetch('/api/portal/' + token + '/approvals')
      .then(function (r) { return r.json(); })
      .then(function (items) {
        if (!items || items.length === 0) {
          el.innerHTML = '<div class="cp-empty">No deliverables pending approval right now.</div>';
          return;
        }
        items.forEach(function (d) {
          var card = document.createElement('div');
          card.className = 'cp-approval-card';

          var title = document.createElement('h3');
          title.className = 'cp-approval-title';
          title.textContent = d.title || 'Untitled';
          card.appendChild(title);

          var meta = document.createElement('div');
          meta.className = 'cp-approval-meta';
          meta.textContent = (d.type || '') + (d.deliveryMonth ? ' · ' + d.deliveryMonth : '');
          card.appendChild(meta);

          var changesLeft = 3 - (d.changeRequestCount || 0);
          var counter = document.createElement('span');
          counter.className = 'cp-change-counter' + (changesLeft <= 0 ? ' exhausted' : '');
          counter.textContent = changesLeft + ' of 3 change requests remaining';
          card.appendChild(counter);

          // Show posts if content calendar
          var meta2 = d.metadata || {};
          if (typeof meta2 === 'string') try { meta2 = JSON.parse(meta2); } catch (e) { meta2 = {}; }
          var posts = meta2.posts || [];
          var editedCaptions = {};

          posts.forEach(function (post, idx) {
            var pCard = document.createElement('div');
            pCard.className = 'cp-post-card';
            var date = document.createElement('div');
            date.className = 'cp-post-date';
            date.textContent = post.date || 'Post ' + (idx + 1);
            pCard.appendChild(date);
            var cap = document.createElement('div');
            cap.className = 'cp-post-caption';
            cap.contentEditable = 'true';
            cap.innerHTML = post.caption || '';
            cap.addEventListener('blur', function () {
              editedCaptions[idx] = cap.innerHTML;
            });
            pCard.appendChild(cap);
            if (post.images && post.images.length > 0) {
              var imgs = document.createElement('div');
              imgs.className = 'cp-post-images';
              post.images.forEach(function (url) {
                var img = document.createElement('img');
                img.src = url;
                img.addEventListener('click', function () { openLightbox(url); });
                imgs.appendChild(img);
              });
              pCard.appendChild(imgs);
            }
            card.appendChild(pCard);
          });

          var actions = document.createElement('div');
          actions.className = 'cp-approval-actions';

          var approveBtn = document.createElement('button');
          approveBtn.className = 'cp-btn cp-btn-approve';
          approveBtn.textContent = '✓ Approve';
          approveBtn.addEventListener('click', function () {
            if (!confirm('Approve this deliverable?')) return;
            fetch('/api/portal/' + token + '/approvals/' + d.id + '/approve', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' }
            }).then(function () { renderTab(); });
          });
          actions.appendChild(approveBtn);

          var changesBtn = document.createElement('button');
          changesBtn.className = 'cp-btn cp-btn-changes';
          changesBtn.textContent = 'Request Changes';
          changesBtn.disabled = changesLeft <= 0;
          var changesBox = document.createElement('div');
          changesBox.className = 'cp-changes-box';
          var changesNotes = document.createElement('textarea');
          changesNotes.placeholder = 'Describe what changes you\'d like...';
          changesBox.appendChild(changesNotes);
          var sendChangesBtn = document.createElement('button');
          sendChangesBtn.className = 'cp-btn cp-btn-changes';
          sendChangesBtn.textContent = 'Send Changes';
          sendChangesBtn.style.marginTop = '10px';
          sendChangesBtn.addEventListener('click', function () {
            var notes = changesNotes.value.trim();
            if (!notes) { alert('Please describe the changes'); return; }
            sendChangesBtn.disabled = true;
            sendChangesBtn.textContent = 'Sending...';
            fetch('/api/portal/' + token + '/approvals/' + d.id + '/request-changes', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                change_notes: notes,
                post_updates: editedCaptions
              })
            }).then(function (r) { return r.json(); })
              .then(function (res) {
                if (res.error) alert(res.error);
                renderTab();
              });
          });
          changesBox.appendChild(sendChangesBtn);

          changesBtn.addEventListener('click', function () {
            changesBox.classList.toggle('open');
          });
          actions.appendChild(changesBtn);
          card.appendChild(actions);
          card.appendChild(changesBox);

          el.appendChild(card);
        });
      });
  }

  function openLightbox(url) {
    var lb = document.createElement('div');
    lb.className = 'cp-lightbox';
    var img = document.createElement('img');
    img.src = url;
    lb.appendChild(img);
    var close = document.createElement('button');
    close.className = 'close';
    close.textContent = '×';
    close.addEventListener('click', function () { lb.remove(); });
    lb.appendChild(close);
    lb.addEventListener('click', function (e) { if (e.target === lb) lb.remove(); });
    document.body.appendChild(lb);
  }
})();
</script>
</body>
</html>
