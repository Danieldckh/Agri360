<!-- Production Tab: Client Communications -->
<template id="productionTabTemplate">
  <div class="dept-tab-wrap">
    <div class="dept-month-selector" id="prodMonthSelector">
      <button class="dept-month-nav dept-month-prev" id="prodMonthPrev" title="Previous month">&#9664;</button>
      <span class="dept-month-label" id="prodMonthLabel">March 2026</span>
      <button class="dept-month-nav dept-month-next" id="prodMonthNext" title="Next month">&#9654;</button>
    </div>
    <div class="dept-sheet-card" style="width:100%">
      <div class="dept-sheet-header">
        <div class="dept-sheet-title-wrap">
          <h3 class="dept-sheet-title">Client Communications</h3>
          <span class="dept-sheet-count" id="prodTabCount">0</span>
        </div>
        <input type="text" class="dept-sheet-search" id="prodTabSearch" placeholder="Search deliverables...">
      </div>
      <div class="dept-sheet-container" id="prodTabSheet" style="overflow:auto;flex:1"></div>
    </div>
  </div>
</template>
