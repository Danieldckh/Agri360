<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProAgri CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap&text=Agri360" rel="stylesheet">
  <link rel="stylesheet" href="ui/css/styles.css">
  <link rel="stylesheet" href="employees/css/employees.css">
  <link rel="stylesheet" href="messaging/css/messaging.css">
  <link rel="stylesheet" href="dev/css/dev.css">
</head>
<body>
  <div class="app">
    <header class="top-header">
      <div class="logo">
        <span class="logo-text">Agri</span><span class="logo-360">360</span>
      </div>
      <div class="user-menu" id="userMenu">
        <button class="user-avatar-btn" id="userAvatarBtn" aria-label="User menu">
          <svg class="user-avatar-placeholder" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <img class="user-avatar-img" id="userAvatarImg" alt="" style="display:none;">
        </button>
      </div>
    </header>
    <div class="main-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-collapse-row">
        <button class="collapse-btn" id="collapseBtn" aria-label="Toggle menu" aria-expanded="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group" data-group="main">
          <button class="nav-group-header" aria-expanded="true">
            <span class="nav-group-label">Main</span>
            <svg class="nav-group-chevron" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
          </button>
          <div class="nav-group-items">
            <a class="nav-item active" data-page="my-view" tabindex="0" aria-current="page">
              <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></span>
              <span class="nav-label">My View</span>
            </a>
            <a class="nav-item" data-page="messaging" tabindex="0">
              <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></span>
              <span class="nav-label">Messaging</span>
            </a>
            <a class="nav-item" data-page="employees" tabindex="0">
              <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></span>
              <span class="nav-label">Employees</span>
            </a>
          </div>
        </div>
        <div class="nav-group" data-group="dev">
          <button class="nav-group-header" aria-expanded="true">
            <span class="nav-group-label">Dev</span>
            <svg class="nav-group-chevron" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
          </button>
          <div class="nav-group-items">
            <a class="nav-item" data-page="styles" tabindex="0">
              <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.02-.23-.27-.38-.62-.38-1.02 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg></span>
              <span class="nav-label">Styles</span>
            </a>
            <a class="nav-item" data-page="components" tabindex="0">
              <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3zm0 10h8v8H3zm10-10h8v8h-8zm0 10h8v8h-8z"/></svg></span>
              <span class="nav-label">Components</span>
            </a>
            <a class="nav-item" data-page="database" tabindex="0">
              <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2 20h20v-4H2v4zm2-3h2v2H4v-2zM2 4v4h20V4H2zm4 3H4V5h2v2zm-4 7h20v-4H2v4zm2-3h2v2H4v-2z"/></svg></span>
              <span class="nav-label">Database</span>
            </a>
          </div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
          <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          <span class="theme-label">Light Mode</span>
        </button>
      </div>
    </aside>

    <aside class="msg-sidebar" id="messagingSidebar">
      <div class="msg-sidebar-header">
        <button class="msg-back-btn" id="msgBackBtn" aria-label="Back to menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <span class="msg-sidebar-title">Messaging</span>
      </div>
      <div class="msg-sidebar-search">
        <input type="text" id="msgSearchInput" placeholder="Search messages..." autocomplete="off">
      </div>
      <div class="msg-sidebar-content" id="msgSidebarContent"></div>
    </aside>

    <div class="content-area">
      <div class="card">
        <div class="dashboard-content" id="dashboardContent">
          <span class="page-placeholder">My View</span>
        </div>
      </div>
    </div>
    </div>
  </div>

  <script src="ui/js/authGuard.js"></script>
  <script src="employees/js/employees.js"></script>
  <script src="messaging/js/emojiIconPicker.js"></script>
  <script src="messaging/js/messaging.js"></script>
  <script src="dev/js/styles-page.js"></script>
  <script src="dev/js/components-page.js"></script>
  <script src="dev/js/database-page.js"></script>
  <script src="ui/js/app.js"></script>
</body>
</html>
