<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ProAgri CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap&text=Agri360" rel="stylesheet">
  <link rel="stylesheet" href="ui/css/styles.css">
  <link rel="stylesheet" href="auth/css/auth.css">
</head>
<body data-page="forgot-password">
  <div class="auth-container">
    <div class="auth-logo">Agri<span class="logo-360">360</span></div>
    <div class="auth-card">
      <h1 class="auth-title">Reset Password</h1>
      <div id="authMessage" class="auth-message" style="display:none"></div>

      <div id="step1" class="step active">
        <form id="step1Form">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" name="username" required>
          </div>
          <button class="btn-primary" type="submit">Next</button>
        </form>
      </div>

      <div id="step2" class="step">
        <form id="step2Form">
          <div class="form-group">
            <label class="form-label">Security Question</label>
            <p id="securityQuestionText" style="color:#fff;font-size:14px;margin-bottom:16px"></p>
          </div>
          <div class="form-group">
            <label class="form-label">Security Answer</label>
            <input class="form-input" type="text" name="securityAnswer" required>
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input class="form-input" type="password" name="newPassword" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input class="form-input" type="password" name="confirmPassword" required>
          </div>
          <button class="btn-primary" type="submit">Reset Password</button>
        </form>
      </div>

      <div id="step3" class="step">
        <p style="color:#27ae60;font-size:14px;text-align:center;margin-bottom:16px">Your password has been reset successfully.</p>
        <div class="auth-link">
          <a href="login.html">Back to Sign In</a>
        </div>
      </div>

      <div class="auth-link">
        <a href="login.html">Back to Sign In</a>
      </div>
    </div>
  </div>
  <script src="auth/js/auth.js"></script>
</body>
</html>
